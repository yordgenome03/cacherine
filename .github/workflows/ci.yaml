name: Run Tests

on:
  pull_request:
    branches:
      - main
      - develop
      - release/**

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        sdk: ['3.5.0', 'stable']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        timeout-minutes: 2

      - name: Set up Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}
        timeout-minutes: 2

      - name: Cache Dart dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ matrix.sdk }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-${{ matrix.sdk }}-
            ${{ runner.os }}-pub-
        timeout-minutes: 2

      - name: Install dependencies
        run: dart pub get
        timeout-minutes: 3

      - name: Check outdated dependencies
        run: dart pub outdated
        timeout-minutes: 2

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
        timeout-minutes: 2

      - name: Analyze project source with strict mode
        run: dart analyze --fatal-infos
        timeout-minutes: 2

      - name: Run tests with coverage
        run: dart test --coverage=coverage/
        timeout-minutes: 5

      - name: Convert coverage to lcov
        run: dart run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib
        timeout-minutes: 2

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: true
        timeout-minutes: 3

      - name: Validate package before publishing
        run: dart pub publish --dry-run
        timeout-minutes: 2
