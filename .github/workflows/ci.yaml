name: Run Tests

on:
  pull_request:
    branches:
      - main
      - develop
      - release/**

permissions:
  contents: read

jobs:
  format-suggestions:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        timeout-minutes: 2

      - name: Set up Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
        timeout-minutes: 2

      - name: Cache Dart dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-stable-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-stable-
            ${{ runner.os }}-pub-
        timeout-minutes: 2

      - name: Install dependencies
        run: dart pub get
        timeout-minutes: 3

      - name: Apply formatting
        run: dart format .
        timeout-minutes: 2

      - name: Suggest formatting fixes via Reviewdog and Fail CI
        uses: reviewdog/action-suggester@v1
        with:
          tool_name: dart format
          github_token: ${{ secrets.GITHUB_TOKEN }}
          filter_mode: added
          fail_on_error: true
        timeout-minutes: 2

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        sdk: ['3.8.0', 'stable']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        timeout-minutes: 2

      - name: Set up Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}
        timeout-minutes: 2

      - name: Cache Dart dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ matrix.sdk }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-${{ matrix.sdk }}-
            ${{ runner.os }}-pub-
        timeout-minutes: 2

      - name: Install dependencies
        run: dart pub get
        timeout-minutes: 3

      - name: Check outdated dependencies
        run: dart pub outdated
        timeout-minutes: 2

      - name: Analyze project source with strict mode
        run: dart analyze --fatal-infos
        timeout-minutes: 2

      - name: Run tests with coverage
        run: dart test --coverage=coverage/
        timeout-minutes: 5

      - name: Convert coverage to lcov
        run: dart run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib
        timeout-minutes: 2

      - name: Upload coverage to Codecov
        if: matrix.sdk == '3.8.0'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: true
        timeout-minutes: 3

      - name: Validate package before publishing
        run: dart pub publish --dry-run
        timeout-minutes: 2
